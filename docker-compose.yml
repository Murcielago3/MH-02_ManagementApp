services:
  api:
    build: ./backend
    # Dev: single process with hot-reload (replaces the Dockerfile's 2-worker CMD).
    # The image ships the GTK/Pango libs WeasyPrint needs, so PDF generation works
    # here even though the Windows host venv can't load them.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mh02admin
      POSTGRES_PASSWORD: mh02pass
      POSTGRES_DB: mh02db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

  # Scheduler for the timed reminders (monthly report, weekly timesheet nudge).
  # Run exactly one beat instance or messages get sent multiple times.
  beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data: