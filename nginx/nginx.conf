# ─────────────────────────────────────────────────────────────────────────
# nginx config for the prod docker-compose stack.
#
# Initial deploy:
#   - The HTTP server (port 80) below is enough to receive Let's Encrypt
#     challenges and serve the site over plain HTTP.
#   - After issuing certs (see DEPLOY.md), uncomment the HTTPS server block
#     at the bottom AND the redirect inside the HTTP block, replace
#     `your-domain.com` with your real domain, and restart the frontend
#     container.
# ─────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge — must stay reachable on port 80 forever
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ─── After HTTPS is up, force-redirect everything else ───
    # Uncomment after the cert is installed.
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # API proxy
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    # Backend-served static (uploads, logos)
    location /static/ {
        proxy_pass http://api:8000/static/;
        proxy_set_header Host $host;
    }

    # Vue SPA — fall back to index.html for client-side routing
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

