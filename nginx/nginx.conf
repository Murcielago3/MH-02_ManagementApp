# ─────────────────────────────────────────────────────────────────────────
# nginx config for the prod docker-compose stack.
#   - HTTP (80): serves Let's Encrypt ACME challenges; redirects all other
#     traffic to HTTPS on the canonical host.
#   - HTTPS (443): serves the Vue SPA and proxies /api + /static to FastAPI.
# Canonical host: www.mh02dashboard.com
# ─────────────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name _;

    # Must stay reachable on port 80 so certbot can renew.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS (canonical host).
    location / {
        return 301 https://www.mh02dashboard.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.mh02dashboard.com mh02dashboard.com;

    ssl_certificate     /etc/letsencrypt/live/www.mh02dashboard.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mh02dashboard.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API proxy → FastAPI
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    # Backend-served uploads / logos
    location /static/ {
        proxy_pass http://api:8000/static/;
        proxy_set_header Host $host;
    }

    # Vue SPA — client-side routing fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
