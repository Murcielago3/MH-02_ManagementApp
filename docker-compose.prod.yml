services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # Bind to loopback only — the API must be reached through nginx (80/443),
    # never directly from the internet. (Docker bypasses ufw, so a plain
    # "8000:8000" would be publicly reachable regardless of the firewall.)
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_static:/app/static
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - api

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: mh02admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mh02pass}
      POSTGRES_DB: mh02db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mh02admin -d mh02db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    restart: always
    volumes:
      - backend_static:/app/static
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Scheduler for the timed reminders (monthly report, weekly timesheet nudge).
  # Run exactly one beat instance or messages get sent multiple times.
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    restart: always
    volumes:
      - backend_static:/app/static
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  backend_static:
  certbot_certs:
  certbot_www:
